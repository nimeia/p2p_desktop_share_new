name: Package Platforms

on:
  workflow_dispatch:
    inputs:
      config:
        description: Build configuration
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Debug
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PACKAGE_CONFIG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.config || 'Release' }}

jobs:
  package-windows:
    name: Package Windows
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          }
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics

      - name: Package Windows archive
        shell: pwsh
        run: |
          ./scripts/windows/package.ps1 -Config $env:PACKAGE_CONFIG

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            out/package/windows/*.zip
            out/package/windows/*/package_manifest.json
          if-no-files-found: error

  package-linux:
    name: Package Linux
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config curl zip unzip tar git libgtk-3-dev libayatana-appindicator3-dev

      - name: Bootstrap vcpkg
        run: |
          if [[ ! -d "$VCPKG_ROOT" ]]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Package Linux archive
        run: |
          bash ./scripts/package_linux.sh --config "$PACKAGE_CONFIG" --vcpkg-root "$VCPKG_ROOT"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: |
            out/package/linux/*.tar.gz
            out/package/linux/*/package_manifest.json
          if-no-files-found: error

  package-macos-intel:
    name: Package macOS Intel
    runs-on: macos-15-intel
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Ninja is available
        run: |
          if ! command -v ninja >/dev/null 2>&1; then
            brew install ninja
          fi

      - name: Bootstrap vcpkg
        run: |
          if [[ ! -d "$VCPKG_ROOT" ]]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Package macOS archive
        run: |
          bash ./scripts/package_macos.sh --config "$PACKAGE_CONFIG" --vcpkg-root "$VCPKG_ROOT"

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-package
          path: |
            out/package/macos/*.dmg
            out/package/macos/*.zip
            out/package/macos/*/package_manifest.json
          if-no-files-found: error

  package-macos-arm64:
    name: Package macOS Apple Silicon
    runs-on: macos-14
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Ninja is available
        run: |
          if ! command -v ninja >/dev/null 2>&1; then
            brew install ninja
          fi

      - name: Bootstrap vcpkg
        run: |
          if [[ ! -d "$VCPKG_ROOT" ]]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Package macOS archive
        run: |
          bash ./scripts/package_macos.sh --config "$PACKAGE_CONFIG" --vcpkg-root "$VCPKG_ROOT"

      - name: Upload macOS Apple Silicon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-package
          path: |
            out/package/macos/*.dmg
            out/package/macos/*.zip
            out/package/macos/*/package_manifest.json
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - package-windows
      - package-linux
      - package-macos-intel
      - package-macos-arm64
    runs-on: ubuntu-24.04
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Automated package build for $TAG_NAME"
          fi

          mapfile -d '' FILES < <(find dist -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.dmg' -o -name 'package_manifest.json' \) -print0)
          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "No release files found under dist/" >&2
            exit 1
          fi

          gh release upload "$TAG_NAME" --clobber "${FILES[@]}"
